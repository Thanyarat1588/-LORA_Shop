<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Contact | ÉLORA WATCH</title>

  <link rel="stylesheet" href="./dist/output.css">

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

  <style>
    body{
      font-family: 'Inter', sans-serif;
    }
  </style>

</head>

<body class="bg-[#faf9f7] text-gray-800">

  <!-- NAVBAR -->
  <nav class="bg-white/80 backdrop-blur-md border-b border-gray-100 sticky top-0 z-50">

    <div class="max-w-7xl mx-auto px-6 h-20 flex items-center justify-between">

      <h1 class="text-2xl font-semibold">
        ÉLORA
      </h1>

      <div class="flex gap-8 text-sm">

        <a href="index.html">Home</a>
        <a href="products.html">Products</a>
        <a href="about.html">About</a>
        <a href="contact.html" class="font-semibold">Contact</a>

      </div>

    </div>

  </nav>

  <!-- CONTACT -->
  <section class="max-w-5xl mx-auto px-6 py-20">

    <div class="text-center mb-16">

      <p class="uppercase tracking-[5px] text-gray-400 text-sm mb-4">
        Contact Us
      </p>

      <h1 class="text-5xl font-semibold mb-6">
        Get In Touch
      </h1>

      <p class="text-gray-500 leading-8 max-w-2xl mx-auto">

        หากต้องการสอบถามข้อมูลเพิ่มเติม
        สามารถติดต่อทีมงานของเราได้ตลอดเวลา

      </p>

    </div>

    <!-- FORM -->
    <div class="bg-white rounded-[40px] p-10 shadow-sm">

      <div class="grid md:grid-cols-2 gap-6 mb-6">

        <input
          type="text"
          placeholder="Your Name"
          class="h-14 px-5 rounded-2xl border border-gray-200 outline-none focus:border-gray-400">

        <input
          type="email"
          placeholder="Your Email"
          class="h-14 px-5 rounded-2xl border border-gray-200 outline-none focus:border-gray-400">

      </div>

      <textarea
        placeholder="Your Message"
        class="w-full h-44 p-5 rounded-2xl border border-gray-200 outline-none focus:border-gray-400 mb-6"></textarea>

      <button
        class="h-14 px-10 rounded-full bg-gray-900 text-white hover:bg-gray-700 duration-300">

        Send Message

      </button>

    </div>

  </section>

</body>
</html>
